<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Sincronizador de Agenda</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-color: #f1f5f9;
            --card-color: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --success-color: #22c55e;
            --border-color: #e2e8f0;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-color);
            padding: 40px;
            border-radius: var(--radius);
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
            border: 1px solid var(--border-color);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn {
            font-family: inherit;
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn:hover { background: var(--primary-hover); }

        .btn-logout {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--border-color);
            margin-top: 20px;
            font-size: 13px;
            padding: 10px;
            box-shadow: none;
        }

        .btn-logout:hover {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        .status {
            margin: 20px 0;
            padding: 16px;
            border-radius: 8px;
            background: #f0fdf4;
            border-left: 4px solid var(--success-color);
            font-size: 14px;
            font-weight: 600;
            color: #166534;
        }

        #log-citas {
            margin-top: 20px;
            background: #0f172a;
            color: #38bdf8;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #1e293b;
            line-height: 1.6;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Sincronizador Google Calendar</h2>
        <p class="subtitle">Mantén este panel abierto en una pestaña en tu PC o teléfono móvil para automatizar la inyección de citas de tus clientes en tiempo real.</p>
        
        <div id="auth-section">
            <button class="btn" id="btn-login">Vincular mi Cuenta de Google</button>
        </div>

        <div id="admin-section" style="display: none;">
            <div id="status-box" class="status">🟢 Conectado con Firestore. Escuchando citas en tiempo real...</div>
            <div id="log-citas">🚀 Consola de sincronización inicializada...<br></div>
            <button class="btn btn-logout" id="btn-logout">Desconectar e Inactivar Servidor</button>
        </div>
    </div>

    <!-- LÓGICA MODULAR DE FIREBASE + GOOGLE OAUTH -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configuración oficial de tu proyecto Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDgIdkDoxCNNF6l0rBXNcSt_EvxdyD5fQU",
            authDomain: "agendacomercial-665e0.firebaseapp.com",
            projectId: "agendacomercial-665e0",
            storageBucket: "agendacomercial-665e0.firebasestorage.app",
            messagingSenderId: "1031235590861",
            appId: "1:1031235590861:web:6b746d3b67e6c4d22ea784",
            measurementId: "G-MPT45E9MES"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const provider = new GoogleAuthProvider();
        // Permiso explícito para poder inyectar eventos en el calendario
        provider.addScope('https://www.googleapis.com/auth/calendar.events');

        // CANDADO DE SEGURIDAD COMERCIAL
        // Cuando le vendas esto a otro cliente, solo cambias este correo por el de él
        const CORREO_DUENO_AUTORIZADO = "mrdjkhali@gmail.com"; 

        let googleAccessToken = null;
        let unsubscribeListener = null;

        // Monitoreo constante del estado de autenticación de Firebase
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email !== CORREO_DUENO_AUTORIZADO) {
                    alert("❌ Acceso denegado: Esta cuenta no está autorizada para administrar esta agenda.");
                    signOut(auth).then(() => location.reload());
                } else if (!googleAccessToken) {
                    // Si refresca la pantalla, le pedimos tocar el botón para re-obtener el token de Google API
                    document.getElementById('auth-section').style.display = 'block';
                    document.getElementById('admin-section').style.display = 'none';
                }
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('admin-section').style.display = 'none';
                if (unsubscribeListener) unsubscribeListener();
            }
        });

        // Evento de Inicio de Sesión por Popup Seguro
        document.getElementById('btn-login').onclick = () => {
            signInWithPopup(auth, provider).then((result) => {
                // Verificar correo del dueño antes de dar acceso al token de la API
                if (result.user.email !== CORREO_DUENO_AUTORIZADO) {
                    alert("❌ Acceso denegado: Tu cuenta de Google no coincide con el dueño de esta licencia.");
                    signOut(auth);
                    return;
                }

                const credential = GoogleAuthProvider.credentialFromResult(result);
                googleAccessToken = credential.accessToken;
                
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                iniciarMonitoreoRealtime();
            }).catch(err => {
                alert("Error de autenticación con Google Cloud: " + err.message);
            });
        };

        // Evento de Desconexión Completa
        document.getElementById('btn-logout').onclick = () => {
            signOut(auth).then(() => location.reload());
        };

        // Oidor en tiempo real de Firestore para pescar citas nuevas
        function iniciarMonitoreoRealtime() {
            const consola = document.getElementById('log-citas');
            const q = query(collection(db, "citas"), where("sincronizado", "==", false));
            
            unsubscribeListener = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const cita = change.doc.data();
                        const docId = change.doc.id;
                        
                        consola.innerHTML += `[${new Date().toLocaleTimeString()}] 📥 Entrada de cita: ${cita.nombre}. Procesando...<br>`;
                        consola.scrollTop = consola.scrollHeight;
                        enviarAGoogleCalendar(cita, docId);
                    }
                });
            });
        }

        // Petición REST directa a la API de Google en nombre del dueño
        function enviarAGoogleCalendar(cita, docId) {
            const fechaInicio = new Date(`${cita.fecha}T${cita.hora}:00`);
            const fechaFin = new Date(fechaInicio.getTime() + (60 * 60 * 1000)); // Bloques fijos de 1 hora

            const evento = {
                summary: `Consultoría IT: ${cita.nombre}`,
                description: `Cliente: ${cita.nombre}\nTeléfono: ${cita.telefono}\nServicio: ${cita.servicio}\n\nNotas del Caso:\n${cita.notas}`,
                start: { dateTime: fechaInicio.toISOString() },
                end: { dateTime: fechaFin.toISOString() }
            };

            fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${googleAccessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(evento)
            })
            .then(res => res.json())
            .then(async (data) => {
                if (data.id) {
                    // Si Google Calendar la asimiló correctamente, actualizamos el documento en Firestore
                    const docRef = doc(db, "citas", docId);
                    await updateDoc(docRef, { sincronizado: true });
                    
                    const consola = document.getElementById('log-citas');
                    consola.innerHTML += `<span style="color: #22c55e;">[ÉXITO] ✅ Cita de ${cita.nombre} sincronizada en Google Calendar de forma transparente.</span><br>`;
                    consola.scrollTop = consola.scrollHeight;
                } else {
                    document.getElementById('log-citas').innerHTML += `<span style="color: #ef4444;">[API GOOGLE ERROR] ❌ Falló la inyección. Token inválido o expirado.</span><br>`;
                }
            })
            .catch(err => {
                document.getElementById('log-citas').innerHTML += `<span style="color: #ef4444;">[NETWORK ERROR] ❌ Sin conexión con los servicios de Google: ${err.message}</span><br>`;
            });
        }
    </script>
</body>
</html>
